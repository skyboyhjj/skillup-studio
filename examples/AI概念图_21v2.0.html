<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI概念图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
canvas:active { cursor: grabbing; }
#ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#title { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.85); font-size: 20px; letter-spacing: 6px; text-shadow: 0 0 20px rgba(78,205,196,0.4); }
#legend { position: absolute; bottom: 20px; left: 20px; color: rgba(255,255,255,0.7); font-size: 13px; line-height: 2; }
#legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
#phase-indicator { position: absolute; bottom: 64px; right: 20px; color: rgba(255,255,255,0.6); font-size: 13px; text-align: right; }
#hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px; }
#tooltip { position: fixed; pointer-events: none; z-index: 20; display: none; background: rgba(10,10,26,0.92); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 12px 16px; max-width: 280px; color: #fff; font-size: 13px; line-height: 1.7; box-shadow: 0 4px 24px rgba(0,0,0,0.6); }
#tooltip .tt-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
#tooltip .tt-docs { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 6px; }
#detail-panel { position: fixed; top: 0; right: -360px; width: 340px; height: 100%; background: rgba(10,10,26,0.95); border-left: 1px solid rgba(255,255,255,0.1); z-index: 30; padding: 40px 24px; color: #fff; transition: right 0.4s ease; overflow-y: auto; pointer-events: auto; }
#detail-panel.open { right: 0; }
#detail-panel .dp-close { position: absolute; top: 12px; right: 16px; cursor: pointer; font-size: 22px; color: rgba(255,255,255,0.5); }
#detail-panel h2 { font-size: 22px; margin-bottom: 12px; }
#detail-panel .dp-desc { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8); margin-bottom: 20px; }
#detail-panel .dp-docs-title { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
#detail-panel .dp-doc-item { font-size: 13px; color: rgba(255,255,255,0.65); padding: 6px 10px; margin-bottom: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; }
#phase-text { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); color: #FFD93D; font-size: 14px; letter-spacing: 4px; opacity: 0; transition: opacity 0.8s; text-shadow: 0 0 12px rgba(255,217,61,0.5); }
/* 管理面板样式 */
#btn-manage {
  position: fixed; top: 20px; right: 20px; z-index: 40;
  background: rgba(10,10,26,0.8); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8); padding: 8px 14px; border-radius: 6px;
  font-size: 13px; cursor: pointer; pointer-events: auto;
  transition: all 0.3s; font-family: inherit;
}
#btn-manage:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
#btn-record {
  background: none; border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.8); padding: 6px 12px; border-radius: 6px;
  font-size: 13px; cursor: pointer; font-family: inherit;
  transition: all 0.3s; white-space: nowrap;
}
#btn-record:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
#btn-record.recording { border-color: #FF6B6B; color: #FF6B6B; animation: recordPulse 1s infinite; }
@keyframes recordPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
#record-info {
  font-size: 11px; color: #FF6B6B; padding-top: 4px; white-space: nowrap;
  opacity: 0; transition: opacity 0.3s; text-align: center;
}
#record-info.visible { opacity: 1; }
#record-area {
  position: fixed; top: 20px; right: 100px; z-index: 40;
  display: flex; flex-direction: column; align-items: center;
}
#audio-area {
  position: fixed; bottom: 20px; right: 20px; z-index: 40;
  display: flex; align-items: center; gap: 8px;
  background: rgba(10,10,26,0.85); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 8px 14px; pointer-events: auto;
}
#audio-btn {
  background: none; border: none; color: rgba(255,255,255,0.6);
  font-size: 20px; cursor: pointer; padding: 2px 6px; line-height: 1;
  transition: color 0.3s;
}
#audio-btn:hover { color: rgba(255,255,255,0.9); }
#audio-btn.active { color: #4ECDC4; }
#audio-slider {
  width: 60px; height: 3px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
  cursor: pointer;
}
#audio-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  border-radius: 50%; background: #4ECDC4; cursor: pointer;
}
#audio-slider::-moz-range-thumb {
  width: 10px; height: 10px;
  border-radius: 50%; background: #4ECDC4; border: none; cursor: pointer;
}

#manage-panel {
  position: fixed; top: 0; left: -420px; width: 400px; height: 100%;
  background: rgba(10,10,26,0.97); border-right: 1px solid rgba(255,255,255,0.1);
  z-index: 50; display: flex; flex-direction: column;
  transition: left 0.4s ease; pointer-events: auto;
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; color: #fff;
}
#manage-panel.open { left: 0; }

.mp-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 16px; font-weight: bold; flex-shrink: 0;
}
.mp-header-btns { display: flex; gap: 6px; }
.mp-header-btns button {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 4px;
  font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.mp-header-btns button:hover { background: rgba(255,255,255,0.15); color: #fff; }
#btn-close-mp { font-size: 20px !important; padding: 4px 8px !important; }

.mp-body { flex: 1; overflow-y: auto; padding: 12px 20px; }

#mp-ring-tabs {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.mp-ring-tab {
  padding: 6px 14px; border-radius: 14px; font-size: 12px;
  border: 1px solid rgba(255,255,255,0.2); background: transparent;
  color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.mp-ring-tab.active { color: #fff; }

.mp-concept-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; margin-bottom: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px; transition: all 0.2s;
}
.mp-concept-item:hover { background: rgba(255,255,255,0.08); }
.mp-ci-dot {
  width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
}
.mp-ci-info { flex: 1; min-width: 0; }
.mp-ci-label { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
.mp-ci-desc { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mp-ci-actions { display: flex; gap: 4px; flex-shrink: 0; }
.mp-ci-actions button {
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5); width: 28px; height: 28px;
  border-radius: 4px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-family: inherit;
}
.mp-ci-actions button:hover { background: rgba(255,255,255,0.12); color: #fff; }
.mp-ci-actions .btn-del:hover { border-color: #FF6B6B; color: #FF6B6B; }

.mp-form {
  margin: 12px 0; padding: 14px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
}
.mp-form.hidden { display: none; }
.mp-form-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
.mp-input {
  width: 100%; padding: 8px 12px; margin-bottom: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px; color: #fff; font-size: 13px;
  font-family: 'Microsoft YaHei', sans-serif; outline: none; transition: border 0.2s;
}
.mp-input:focus { border-color: rgba(255,255,255,0.4); }
.mp-input::placeholder { color: rgba(255,255,255,0.25); }
.mp-textarea { min-height: 60px; resize: vertical; }

.mp-btn {
  padding: 7px 16px; border-radius: 4px; font-size: 13px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); cursor: pointer; margin-right: 6px;
  font-family: inherit; transition: all 0.2s;
}
.mp-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.mp-btn-primary { background: rgba(78,205,196,0.2); border-color: rgba(78,205,196,0.5); color: #4ECDC4; }
.mp-btn-primary:hover { background: rgba(78,205,196,0.35); color: #4ECDC4; }

.mp-add-btn-area { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); }

.mp-empty { text-align: center; color: rgba(255,255,255,0.3); padding: 30px 0; font-size: 13px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui-layer">
  <div id="title">AI概念图</div>
  <div id="legend">
    <div style="margin-bottom:6px;font-size:12px;color:rgba(255,255,255,0.4)">三层结构</div>
    <div><span class="dot" style="background:#3498DB"></span>基础层 · 神经网络</div>
<div><span class="dot" style="background:#2ECC71"></span>架构层 · Transformer</div>
<div><span class="dot" style="background:#9B59B6"></span>前沿层 · 通用智能AGI</div>
    <div style="margin:10px 0 6px;font-size:12px;color:rgba(255,255,255,0.4)">五行</div>
    <div><span class="dot" style="background:#2ecc71"></span>木（生长）</div>
    <div><span class="dot" style="background:#e74c3c"></span>火（发散）</div>
    <div><span class="dot" style="background:#f39c12"></span>土（承载）</div>
    <div><span class="dot" style="background:#f1c40f"></span>金（收敛）</div>
    <div><span class="dot" style="background:#3498db"></span>水（流动）</div>
    <div style="margin:10px 0 6px;font-size:12px;color:rgba(255,255,255,0.4)">八卦</div>
    <div style="font-size:14px;line-height:1.8;color:rgba(255,255,255,0.6)">☰乾 ☱兑 ☲离 ☳震<br>☴巽 ☵坎 ☶艮 ☷坤</div>
  </div>
  <div id="phase-indicator"></div>
  <div id="hint">拖动旋转 · 点击查看 · 右上角管理概念 · 自动播放三轮体空</div>

</div>
<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-desc"></div>
  <div class="tt-docs"></div>
</div>
<div id="detail-panel">
  <div class="dp-close" id="dp-close">&times;</div>
  <h2 id="dp-name"></h2>
  <div id="dp-tags" style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;"></div>

  <div class="dp-docs-title">相关文档</div>
  <div id="dp-docs"></div>
</div>
<!-- 管理面板 -->
<button id="btn-manage" title="概念管理">&#9881; 管理</button>
<div id="record-area">
  <button id="btn-record" title="录制动画">&#9655; 录制</button>
  <div id="record-info"></div>
</div>
<div id="audio-area">
  <button id="audio-btn" title="音频开关">&#x1f507;</button>
  <input type="range" id="audio-slider" min="0" max="100" value="60" title="音量">
</div>
<div id="manage-panel">
  <div class="mp-header">
    <span>概念管理</span>
    <div class="mp-header-btns">
      <button id="btn-reset" title="恢复默认">&#8634; 重置</button>
      <button id="btn-import" title="导入JSON">&#8613; 导入</button>
      <button id="btn-export" title="导出JSON">&#8615; 导出</button>
      <button id="btn-close-mp" title="关闭">&times;</button>
    </div>
  </div>
  <div class="mp-body">
    <div id="mp-ring-tabs"></div>
    <div id="mp-concept-list"></div>
    <div id="mp-form-area">
      <div id="mp-add-form" class="mp-form hidden">
        <div class="mp-form-title">添加概念</div>
        <input type="text" id="add-label" placeholder="概念名称" class="mp-input">
        <textarea id="add-desc" placeholder="概念描述" class="mp-input mp-textarea"></textarea>
        <input type="text" id="add-docs" placeholder="来源文档（逗号分隔）" class="mp-input">
        <button id="btn-add" class="mp-btn mp-btn-primary">添加</button>
        <button id="btn-cancel-add" class="mp-btn">取消</button>
      </div>
      <div id="mp-edit-form" class="mp-form hidden">
        <div class="mp-form-title">编辑概念</div>
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-ring-idx">
        <input type="text" id="edit-label" placeholder="概念名称" class="mp-input">
        <textarea id="edit-desc" placeholder="概念描述" class="mp-input mp-textarea"></textarea>
        <input type="text" id="edit-docs" placeholder="来源文档（逗号分隔）" class="mp-input">
        <button id="btn-save-edit" class="mp-btn mp-btn-primary">保存</button>
        <button id="btn-cancel-edit" class="mp-btn">取消</button>
      </div>
    </div>
    <div class="mp-add-btn-area">
      <button id="btn-show-add" class="mp-btn mp-btn-primary">+ 添加新概念</button>
    </div>
    <div id="mp-summary" style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;color:rgba(255,255,255,0.3);text-align:center;"></div>
  </div>
</div>
<input type="file" id="file-import" accept=".json" style="display:none">
<!-- 管理面板结束 -->
<script>
(function() {
  'use strict';

  // === 画布初始化 ===
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W, H, cx, cy;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // === 莫比乌斯环数学 ===
  function mobiusPoint(u, v, R, w) {
    var x = (R + v * Math.cos(u / 2)) * Math.cos(u);
    var y = (R + v * Math.cos(u / 2)) * Math.sin(u);
    var z = v * Math.sin(u / 2);
    return [x, y, z];
  }

  function project(pt, rotY, rotX) {
    var cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    var x = pt[0] * cosY - pt[2] * sinY;
    var z = pt[0] * sinY + pt[2] * cosY;
    var y = pt[1];
    var cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    var y2 = y * cosX - z * sinX;
    var z2 = y * sinX + z * cosX;
    var fov = 600;
    var scale = fov / (fov + z2 + 300);
    return { x: cx + x * scale, y: cy + y2 * scale, s: scale, z: z2 };
  }

  // === 数据层：localStorage 持久化 ===
  var STORAGE_KEY = 'weishi_mobius_data';
  var DEFAULT_RINGS = [
    {
      label: '基础层', R: 200, w: 30, yOffset: 120, color: '#3498DB',
      concepts: [
        { label: '神经网络', desc: '模拟生物神经系统信息处理机制的数学模型。由人工神经元及其连接构成，通过调整权重实现模式识别与函数逼近。深度学习的基础架构，支撑了当代AI的核心能力。', docs: ["深度学习（Goodfellow）", "神经网络与深度学习（Nielsen）", "人工神经网络原理"], wuxing:'木', bagua:'☳震' },
        { label: '深度学习', desc: '基于多层神经网络的特征学习方法。通过逐层抽象提取数据的高层表示，在图像识别、语音处理、自然语言理解等领域取得突破性进展。是当代AI最具影响力的技术范式。', docs: ["深度学习（Goodfellow）", "ImageNet论文（AlexNet）", "深度学习革命"], wuxing:'火', bagua:'☲离' },
        { label: '自然语言处理', desc: '使计算机理解、生成和处理人类自然语言的技术领域。涵盖分词、句法分析、语义理解、文本生成等任务，是大语言模型的核心应用场景和检验标准。', docs: ["Speech and Language Processing（Jurafsky）", "统计自然语言处理（Manning）", "自然语言处理综论"], wuxing:'水', bagua:'☵坎' },
        { label: '计算机视觉', desc: '使机器从图像或视频中获取高层语义信息的技术。包括图像分类、目标检测、语义分割、三维重建等，是自动驾驶、医学影像、安防监控等应用的技术基础。', docs: ["Computer Vision（Szeliski）", "Deep Learning for CV", "计算机视觉：算法与应用"], wuxing:'金', bagua:'☰乾' },
        { label: '强化学习', desc: '智能体通过与环境交互学习最优行为策略的方法。以延迟奖励和试错探索为核心特征，在游戏对弈、机器人控制、资源调度等领域展现强大潜力。AlphaGo即由此技术驱动。', docs: ["Reinforcement Learning（Sutton & Barto）", "AlphaGo论文", "强化学习导论"], wuxing:'木', bagua:'☴巽' },
        { label: '生成模型', desc: '学习数据分布以生成新样本的概率模型。从VAE到GAN到扩散模型，生成模型在图像合成、文本创作、药物设计等领域持续突破，正深刻改变内容生产方式。', docs: ["Generative Adversarial Networks", "Diffusion Models（Ho et al.）", "生成式深度学习"], wuxing:'水', bagua:'☱兑' },
        { label: '注意力机制', desc: '使模型动态聚焦于输入序列关键部分的技术。通过计算查询与键的相似度权重，实现对信息的自适应选择。是Transformer架构的基石，彻底改变了序列建模范式。', docs: ["Attention Is All You Need", "BERT论文", "注意力机制详解"], wuxing:'火', bagua:'☶艮' },
      ]
    },
    {
      label: '架构层', R: 150, w: 25, yOffset: 0, color: '#2ECC71',
      concepts: [
        { label: 'Transformer', desc: '基于自注意力机制的序列到序列架构，彻底取代了循环与卷积在NLP领域的主导地位。其并行计算能力与可扩展性使其成为大语言模型的标准架构范式。', docs: ["Attention Is All You Need", "Transformer架构详解", "The Annotated Transformer"], wuxing:'金', bagua:'☰乾' },
        { label: '大语言模型', desc: '通过海量文本数据训练的超大规模参数语言模型。具备上下文学习、指令遵循、多步推理等涌现能力，正在重塑人机交互方式与知识工作流程。', docs: ["GPT-4论文", "LLaMA论文", "大语言模型综述"], wuxing:'火', bagua:'☲离' },

  function loadData() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return null;
  }

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rings));
      localStorage.setItem(STORAGE_KEY + '_emptiness', JSON.stringify(EMPTINESS));
    } catch(e) {}
  }

  function resetToDefault() {
    rings = JSON.parse(JSON.stringify(DEFAULT_RINGS));
    saveData();
    refreshPanelList();
  }

  // 为旧数据补 id
  function ensureIds() {
    var counter = 0;
    rings.forEach(function(ring) {
      ring.concepts.forEach(function(c) {
        if (!c.id) c.id = 'concept_' + Date.now() + '_' + (counter++);
      });
    });
  }

  var DATA_VERSION = 'v2.0';
  var rings = loadData() || JSON.parse(JSON.stringify(DEFAULT_RINGS));
  ensureIds();

  // 数据版本检查：旧版数据缺少 wuxing/bagua/ringLabel，自动合并 DEFAULT_RINGS 的新字段
  function upgradeData() {
    var saved = loadData();
    if (!saved) return;
    var needsUpgrade = false;
    saved.forEach(function(ring) {
      ring.concepts.forEach(function(c) {
        if (c.wuxing === undefined && c.bagua === undefined) needsUpgrade = true;
      });
    });
    if (needsUpgrade) {
      for (var ri = 0; ri < saved.length && ri < DEFAULT_RINGS.length; ri++) {
        for (var ci = 0; ci < saved[ri].concepts.length && ci < DEFAULT_RINGS[ri].concepts.length; ci++) {
          var sc = saved[ri].concepts[ci];
          var dc = DEFAULT_RINGS[ri].concepts[ci];
          if (sc.wuxing === undefined && dc.wuxing) sc.wuxing = dc.wuxing;
          if (sc.bagua === undefined && dc.bagua) sc.bagua = dc.bagua;
        }
      }
      rings = saved;
      saveData();
    }
  }
  upgradeData();

  // === 状态变量 ===
  var rotY = 0, rotX = 0.3;
  var autoRotSpeed = 0.003;
  var isDragging = false;
  var lastMX = 0, lastMY = 0;
  var dragVelY = 0, dragVelX = 0;
  var lastDragTime = 0;
  var autoResumeTimer = null;
  var zoomScale = 1;
  var startTime = Date.now();
  var hoveredNode = null;
  var selectedNode = null;

  // === 粒子系统 ===
  var particles = [];

  function spawnParticle(fromRing, toRing, color) {
    particles.push({
      t: 0,
      speed: 0.008 + Math.random() * 0.006,
      fromRing: fromRing,
      toRing: toRing,
      color: color,
      side: Math.random() > 0.5 ? 1 : -1
    });
  }

  // === 阶段系统 ===
  var PHASE_CONSTRUCT = 0, PHASE_FLOW = 1, PHASE_EMPTINESS = 2, PHASE_WANE = 3;
  var phaseNames = ['建构', '流转', '三轮体空', '为道日损'];
  var CYCLE_DURATION = 50000;

  // === 五空配置 ===
  var EMPTINESS = {
    sunyata: true,
    mirror: true,
    breath: true,
    wane: true,
    ascend: true,
    mirrorRatio: 0.42,
    breathPeriod: 10000,
    breathAmplitude: 15,
    fadeStart: 35000,
    fadeEnd: 50000,
    fadeTarget: 0.15,
    fadeRestore: 0.5,
    ascendRatio: 0.2,
    mirrorRadius: 120
  };
  // 从 localStorage 数据中合并 emptiness 覆盖（如果有）
  function mergeEmptiness(data) {
    if (data && data.emptiness) {
      for (var k in data.emptiness) {
        if (data.emptiness.hasOwnProperty(k)) EMPTINESS[k] = data.emptiness[k];
      }
    }
  }
  // 尝试从 localStorage 读取 emptiness 配置
  try {
    var savedExtra = localStorage.getItem(STORAGE_KEY + '_emptiness');
    if (savedExtra) mergeEmptiness(JSON.parse(savedExtra));
  } catch(e) {}

  function getPhase(t) {
    if (t < 8000) return PHASE_CONSTRUCT;
    if (t < 20000) return PHASE_FLOW;
    if (t < 35000) return PHASE_EMPTINESS;
    return PHASE_WANE;
  }

  function getPhaseProgress(t) {
    if (t < 8000) return t / 8000;
    if (t < 20000) return (t - 8000) / 12000;
    if (t < 35000) return (t - 20000) / 15000;
    return (t - 35000) / 15000;
  }

  // === 阶段标语 ===
  var PHASE_TEXTS = [
    '',                                 // 建构：无标语
    '',                                 // 流转：无标语
    '施者空 · 受者空 · 施事空',          // 三轮体空
    '损之又损，以至于无为'               // 为道日损
  ];

  // === 交互 ===
  canvas.addEventListener('mousedown', function(e) {
    isDragging = true;
    lastMX = e.clientX;
    lastMY = e.clientY;
    dragVelY = 0;
    dragVelX = 0;
    lastDragTime = Date.now();
    if (autoResumeTimer) clearTimeout(autoResumeTimer);
  });
  // === 触摸事件（移动端支持 v1.2） ===
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = true;
      lastMX = e.touches[0].clientX;
      lastMY = e.touches[0].clientY;
      dragVelY = 0; dragVelX = 0;
      lastDragTime = Date.now();
      if (autoResumeTimer) clearTimeout(autoResumeTimer);
      e.preventDefault();
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    if (isDragging && e.touches.length === 1) {
      var dx = e.touches[0].clientX - lastMX;
      var dy = e.touches[0].clientY - lastMY;
      dragVelY = dx * 0.005; dragVelX = dy * 0.005;
      rotY += dragVelY; rotX += dragVelX;
      rotX = Math.max(-1.2, Math.min(1.2, rotX));
      lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
      lastDragTime = Date.now();
      e.preventDefault();
    }
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    if (isDragging) {
      isDragging = false;
      autoResumeTimer = setTimeout(function() { dragVelY = 0; dragVelX = 0; }, 3000);
    }
  });

  window.addEventListener('mousemove', function(e) {
    if (isDragging) {
      var dx = e.clientX - lastMX;
      var dy = e.clientY - lastMY;
      dragVelY = dx * 0.005;
      dragVelX = dy * 0.005;
      rotY += dragVelY;
      rotX += dragVelX;
      rotX = Math.max(-1.2, Math.min(1.2, rotX));
      lastMX = e.clientX;
      lastMY = e.clientY;
      lastDragTime = Date.now();
    }
    // 悬停检测
    checkHover(e.clientX, e.clientY);
  });

  window.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      autoResumeTimer = setTimeout(function() { dragVelY = 0; dragVelX = 0; }, 3000);
    }
  });

  canvas.addEventListener('click', function(e) {
    if (hoveredNode) {
      showDetail(hoveredNode);
    } else {
      closeDetail();
    }
  });

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    zoomScale *= e.deltaY > 0 ? 0.95 : 1.05;
    zoomScale = Math.max(0.4, Math.min(2.5, zoomScale));
  }, { passive: false });

  // 触摸支持
  var touchStartDist = 0;
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = true;
      lastMX = e.touches[0].clientX;
      lastMY = e.touches[0].clientY;
      dragVelY = 0; dragVelX = 0;
      lastDragTime = Date.now();
      if (autoResumeTimer) clearTimeout(autoResumeTimer);
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      touchStartDist = Math.sqrt(dx * dx + dy * dy);
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && isDragging) {
      var dx = e.touches[0].clientX - lastMX;
      var dy = e.touches[0].clientY - lastMY;
      dragVelY = dx * 0.005;
      dragVelX = dy * 0.005;
      rotY += dragVelY;
      rotX += dragVelX;
      rotX = Math.max(-1.2, Math.min(1.2, rotX));
      lastMX = e.touches[0].clientX;
      lastMY = e.touches[0].clientY;
      lastDragTime = Date.now();
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (touchStartDist > 0) {
        zoomScale *= dist / touchStartDist;
        zoomScale = Math.max(0.4, Math.min(2.5, zoomScale));
      }
      touchStartDist = dist;
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', function() {
    if (isDragging) {
      isDragging = false;
      autoResumeTimer = setTimeout(function() { dragVelY = 0; dragVelX = 0; }, 3000);
    }
    touchStartDist = 0;
  });

  // === 悬停检测 ===
  var projectedNodes = [];

  function checkHover(mx, my) {
    hoveredNode = null;
    for (var i = projectedNodes.length - 1; i >= 0; i--) {
      var n = projectedNodes[i];
      var dx = mx - n.px;
      var dy = my - n.py;
      if (dx * dx + dy * dy < (n.r + 6) * (n.r + 6)) {
        hoveredNode = n;
        break;
      }
    }
    var tt = document.getElementById('tooltip');
    if (hoveredNode) {
      canvas.style.cursor = 'pointer';
      tt.style.display = 'block';
      var tx = mx + 16, ty = my - 10;
      if (tx + 280 > W) tx = mx - 296;
      if (ty + 150 > H) ty = my - 150;
      tt.style.left = tx + 'px';
      tt.style.top = ty + 'px';
      tt.style.borderColor = hoveredNode.color;
      var wxTagT = hoveredNode.wuxing ? ' [' + hoveredNode.wuxing + '·' + (hoveredNode.bagua||'') + ']' : '';
      tt.querySelector('.tt-name').textContent = hoveredNode.label + wxTagT;
      tt.querySelector('.tt-name').style.color = hoveredNode.color;
      tt.querySelector('.tt-desc').textContent = hoveredNode.desc;
      tt.querySelector('.tt-docs').textContent = '来源: ' + hoveredNode.docs.join(' · ');
    } else {
      canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
      tt.style.display = 'none';
    }
  }

  // === 详情面板 ===
  function showDetail(node) {
    selectedNode = node;
    var panel = document.getElementById('detail-panel');
    document.getElementById('dp-name').textContent = node.label;
    document.getElementById('dp-name').style.color = node.color;
    // 标签：层级 + 五行 + 八卦
    var tagsEl = document.getElementById('dp-tags');
    tagsEl.innerHTML = '';
    if (node.ringLabel) {
      tagsEl.innerHTML += '<span style="padding:3px 10px;border-radius:12px;font-size:12px;background:rgba(255,255,255,0.08);border:1px solid ' + node.color + ';color:' + node.color + '">' + node.ringLabel + '</span>';
    }
    if (node.wuxing) {
      var wxColors = {'木':'#2ecc71','火':'#e74c3c','土':'#f39c12','金':'#f1c40f','水':'#3498db'};
      var wxC = wxColors[node.wuxing] || 'rgba(255,255,255,0.5)';
      tagsEl.innerHTML += '<span style="padding:3px 10px;border-radius:12px;font-size:12px;background:' + wxC + '22;color:' + wxC + ';border:1px solid ' + wxC + '44">' + node.wuxing + '</span>';
    }
    if (node.bagua) {
      tagsEl.innerHTML += '<span style="padding:3px 10px;border-radius:12px;font-size:12px;background:rgba(255,217,61,0.1);color:#FFD93D;border:1px solid rgba(255,217,61,0.25)">' + node.bagua + '</span>';
    }
    document.getElementById('dp-desc').textContent = node.desc;
    var docsEl = document.getElementById('dp-docs');
    docsEl.innerHTML = '';
    node.docs.forEach(function(d) {
      var div = document.createElement('div');
      div.className = 'dp-doc-item';
      div.textContent = d;
      docsEl.appendChild(div);
    });
    panel.classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    selectedNode = null;
  }

  document.getElementById('dp-close').addEventListener('click', function(e) {
    e.stopPropagation();
    closeDetail();
  });

  // === CRUD 管理逻辑 ===
  var activeRingIdx = 0;

  function refreshRingTabs() {
    var tabsEl = document.getElementById('mp-ring-tabs');
    tabsEl.innerHTML = '';
    rings.forEach(function(ring, idx) {
      var btn = document.createElement('button');
      btn.className = 'mp-ring-tab' + (idx === activeRingIdx ? ' active' : '');
      btn.textContent = ring.label + ' (' + ring.concepts.length + ')';
      btn.style.cssText = idx === activeRingIdx
        ? 'background:' + ring.color + ';border-color:' + ring.color + ';color:#0a0a1a;font-weight:bold'
        : '';
      btn.addEventListener('click', function() {
        activeRingIdx = idx;
        refreshRingTabs();
        refreshPanelList();
      });
      tabsEl.appendChild(btn);
    });
  }

  function refreshPanelList() {
    refreshRingTabs();
    var listEl = document.getElementById('mp-concept-list');
    listEl.innerHTML = '';
    var ring = rings[activeRingIdx];
    if (!ring || ring.concepts.length === 0) {
      listEl.innerHTML = '<div class="mp-empty">该层暂无概念，点击下方按钮添加</div>';
      updateSummary();
      return;
    }
    ring.concepts.forEach(function(c, idx) {
      var div = document.createElement('div');
      div.className = 'mp-concept-item';
      div.innerHTML =
        '<div class="mp-ci-dot" style="background:' + ring.color + '"></div>' +
        '<div class="mp-ci-info">' +
          '<div class="mp-ci-label">' + escHtml(c.label) + '</div>' +
          '<div class="mp-ci-desc">' + escHtml(c.desc) + '</div>' +
        '</div>' +
        '<div class="mp-ci-actions">' +
          '<button class="btn-move-up" title="上移">&#9650;</button>' +
          '<button class="btn-move-down" title="下移">&#9660;</button>' +
          '<button class="btn-edit" title="编辑">&#9998;</button>' +
          '<button class="btn-del" title="删除">&#10005;</button>' +
        '</div>';

      // 上移
      div.querySelector('.btn-move-up').addEventListener('click', function() {
        if (idx > 0) {
          var arr = ring.concepts;
          var temp = arr[idx]; arr[idx] = arr[idx - 1]; arr[idx - 1] = temp;
          saveData(); refreshPanelList();
        }
      });
      // 下移
      div.querySelector('.btn-move-down').addEventListener('click', function() {
        if (idx < ring.concepts.length - 1) {
          var arr = ring.concepts;
          var temp = arr[idx]; arr[idx] = arr[idx + 1]; arr[idx + 1] = temp;
          saveData(); refreshPanelList();
        }
      });
      // 编辑
      div.querySelector('.btn-edit').addEventListener('click', function() {
        showEditForm(activeRingIdx, c);
      });
      // 删除
      div.querySelector('.btn-del').addEventListener('click', function() {
        if (confirm('确定删除概念「' + c.label + '」？')) {
          ring.concepts.splice(idx, 1);
          saveData(); refreshPanelList();
        }
      });

      listEl.appendChild(div);
    });
    updateSummary();
  }

  function updateSummary() {
    var el = document.getElementById('mp-summary');
    var total = 0;
    var parts = [];
    rings.forEach(function(r) {
      total += r.concepts.length;
      parts.push(r.label + ':' + r.concepts.length);
    });
    el.textContent = '共 ' + total + ' 个概念 (' + parts.join(' / ') + ')';
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function hideAllForms() {
    document.getElementById('mp-add-form').classList.add('hidden');
    document.getElementById('mp-edit-form').classList.add('hidden');
  }

  // 添加
  document.getElementById('btn-show-add').addEventListener('click', function() {
    hideAllForms();
    document.getElementById('add-label').value = '';
    document.getElementById('add-desc').value = '';
    document.getElementById('add-docs').value = '';
    document.getElementById('mp-add-form').classList.remove('hidden');
  });
  document.getElementById('btn-cancel-add').addEventListener('click', hideAllForms);
  document.getElementById('btn-add').addEventListener('click', function() {
    var label = document.getElementById('add-label').value.trim();
    var desc = document.getElementById('add-desc').value.trim();
    var docsStr = document.getElementById('add-docs').value.trim();
    if (!label) { alert('请输入概念名称'); return; }
    var docs = docsStr ? docsStr.split(/[,，]/).map(function(s) { return s.trim(); }).filter(Boolean) : [];
    var newConcept = {
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      label: label, desc: desc || '暂无描述', docs: docs
    };
    rings[activeRingIdx].concepts.push(newConcept);
    saveData();
    hideAllForms();
    refreshPanelList();
  });

  // 编辑
  function showEditForm(ringIdx, concept) {
    hideAllForms();
    document.getElementById('edit-id').value = concept.id;
    document.getElementById('edit-ring-idx').value = ringIdx;
    document.getElementById('edit-label').value = concept.label;
    document.getElementById('edit-desc').value = concept.desc;
    document.getElementById('edit-docs').value = concept.docs.join(', ');
    document.getElementById('mp-edit-form').classList.remove('hidden');
  }

  // === 动画录制功能 ===
  var recorder = null;
  var recordedChunks = [];
  var recordStartTime = 0;
  var progressTimer = null;
  var btnRecord = document.getElementById('btn-record');
  var recordInfo = document.getElementById('record-info');

  function showRecordInfo(msg, color) {
    recordInfo.textContent = msg;
    recordInfo.style.color = color || '#FF6B6B';
    recordInfo.classList.add('visible');
  }
  function hideRecordInfo() {
    recordInfo.classList.remove('visible');
  }

  btnRecord.addEventListener('click', function() {
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      return;
    }
    if (!canvas.captureStream || !window.MediaRecorder) {
      alert('当前浏览器不支持录制功能。\n请使用 Chrome/Edge/Firefox 最新版本。');
      return;
    }
    if (location.protocol === 'file:') {
      var useAnyway = confirm(
        '录制功能需要 HTTP 协议支持。\n\n' +
        '当前以 file:// 打开，录制可能失败。\n\n' +
        '推荐方式：在文件所在目录运行以下命令启动本地服务器：\n' +
        'python -m http.server 8080\n' +
        '然后访问 http://localhost:8080/文件名.html\n\n' +
        '点击"确定"尝试录制，"取消"放弃。'
      );
      if (!useAnyway) return;
    }
    var mode = prompt(
      '录制选项（输入数字）：\n1 = 完整周期（' + Math.round(CYCLE_DURATION/1000) + '秒）\n2 = 自定义秒数\n\n直接回车 = ' + Math.round(CYCLE_DURATION/1000) + '秒',
      '1'
    );
    if (mode === null) return;

    var durationMs;
    if (mode === '1' || mode === '') {
      durationMs = CYCLE_DURATION + 2000;
    } else {
      var secs = parseInt(mode);
      if (isNaN(secs) || secs < 1 || secs > 300) {
        alert('请输入 1-300 之间的秒数');
        return;
      }
      durationMs = secs * 1000;
    }

    var startFromBeginning = confirm(
      '录制起点：\n\n确定 = 从建构阶段开始（推荐完整录制）\n取消 = 从当前位置继续'
    );

    if (startFromBeginning) {
      startTime = Date.now();
    }

    try {
      var stream = canvas.captureStream(30);
      var recScale = Math.min(1, 960 / canvas.width, 720 / canvas.height);
      var recCanvas = document.createElement('canvas');
      var recW = Math.round(canvas.width * recScale);
      var recH = Math.round(canvas.height * recScale);
      recCanvas.width = recW;
      recCanvas.height = recH;
      var recCtx = recCanvas.getContext('2d');
      var recordStream;
      if (recScale < 1) {
        var copyLoop = setInterval(function() {
          recCtx.drawImage(canvas, 0, 0, recW, recH);
        }, 1000 / 30);
        recordStream = recCanvas.captureStream(30);
      } else {
        recordStream = stream;
      }
      // 合并音频流（如果音频引擎已开启）
      if (audioCtx && audioState > 0) {
        try {
          var audioDest = audioCtx.createMediaStreamDestination();
          audioNodes.masterGain.connect(audioDest);
          var audioTracks = audioDest.stream.getAudioTracks();
          for (var ai = 0; ai < audioTracks.length; ai++) {
            recordStream.addTrack(audioTracks[ai]);
          }
        } catch(e) { /* 音频流合并失败，继续无声录制 */ }
      }
      // 桌面端优先 MP4，移动端降级 WebM
      var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      var mimeType = '';
      if (!isMobile) {
        // 桌面端：尝试 MP4（H.264 + AAC）
        if (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')) {
          mimeType = 'video/mp4;codecs=avc1';
        } else if (MediaRecorder.isTypeSupported('video/mp4')) {
          mimeType = 'video/mp4';
        }
      }
      if (!mimeType) {
        // 移动端或 MP4 不支持：降级 WebM VP9 → VP8 → 裸 WebM
        if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
          mimeType = 'video/webm;codecs=vp9';
        } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
          mimeType = 'video/webm;codecs=vp8';
        } else if (MediaRecorder.isTypeSupported('video/webm')) {
          mimeType = 'video/webm';
        }
      }
      var ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
      var options = mimeType ? { mimeType: mimeType, videoBitsPerSecond: 2500000 } : {};
      recordedChunks = [];
      recorder = new MediaRecorder(recordStream, options);

      recorder.ondataavailable = function(e) {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
      };

      recorder.onstop = function() {
        if (recScale < 1 && copyLoop) clearInterval(copyLoop);
        if (recordedChunks.length === 0) {
          btnRecord.classList.remove('recording');
          btnRecord.innerHTML = '&#9655; 录制';
          hideRecordInfo();
          recorder = null;
          return;
        }
        var blob = new Blob(recordedChunks, { type: mimeType || 'video/webm' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = '莫比乌斯概念地图_' + new Date().toISOString().slice(0, 10) + '.' + ext;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        btnRecord.classList.remove('recording');
        btnRecord.innerHTML = '&#9655; 录制';
        showRecordInfo('录制完成，已下载 (' + ext.toUpperCase() + ')', '#4ECDC4');
        if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
        setTimeout(hideRecordInfo, 4000);
        recorder = null;
      };

      recordStartTime = Date.now();
      recorder.start(100);
      btnRecord.classList.add('recording');
      btnRecord.innerHTML = '&#9632; 停止';
      showRecordInfo('录制中... 0% / ' + Math.round(durationMs/1000) + 's');

      progressTimer = setInterval(function() {
        if (!recorder || recorder.state !== 'recording') {
          if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
          return;
        }
        var elapsed = Date.now() - recordStartTime;
        var pct = Math.min(100, Math.round(elapsed / durationMs * 100));
        var remain = Math.max(0, Math.ceil((durationMs - elapsed) / 1000));
        showRecordInfo('录制中... ' + pct + '% (剩余' + remain + 's)');
        if (elapsed >= durationMs) {
          clearInterval(progressTimer);
          progressTimer = null;
          recorder.stop();
        }
      }, 500);

    } catch(err) {
      alert('录制启动失败: ' + err.message);
    }
  });

  // === 五阶音景引擎 ===
  var AUDIO = {
    enabled: true, breath: true, construct: true, flow: true, dissolve: true, wane: true,
    baseFreq: 432, masterVolume: 0.06, breathPeriod: 4000
  };
  // 从 localStorage 读取音频配置
  try {
    var savedAudio = localStorage.getItem(STORAGE_KEY + '_audio');
    if (savedAudio) {
      var aCfg = JSON.parse(savedAudio);
      for (var ak in aCfg) { if (aCfg.hasOwnProperty(ak)) AUDIO[ak] = aCfg[ak]; }
    }
  } catch(e) {}

  var audioCtx = null;
  var audioState = 0; // 0=静音 1=呼吸+音景 2=仅音景
  var audioNodes = {}; // 存储所有音频节点引用
  var audioAnimFrame = null;
  var audioPhaseCheckTimer = null;
  var lastAudioPhase = -1;
  var btnAudio = document.getElementById('audio-btn');
  var sliderAudio = document.getElementById('audio-slider');
  sliderAudio.value = Math.round(AUDIO.masterVolume / 0.1 * 100);

  function initAudioEngine() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 主音量
    var masterGain = audioCtx.createGain();
    masterGain.gain.value = AUDIO.masterVolume;
    masterGain.connect(audioCtx.destination);
    audioNodes.masterGain = masterGain;

    // === 呼吸层（全程粉色噪声 + 4秒包络） ===
    var breathGain = audioCtx.createGain();
    breathGain.gain.value = 0;
    breathGain.connect(masterGain);
    audioNodes.breathGain = breathGain;

    // 粉色噪声源（Paul Kellet 算法）
    var pinkBufSize = 4096;
    var pinkNode = audioCtx.createScriptProcessor(pinkBufSize, 1, 1);
    var pb0=0,pb1=0,pb2=0,pb3=0,pb4=0,pb5=0;
    pinkNode.onaudioprocess = function(e) {
      var out = e.outputBuffer.getChannelData(0);
      for (var i=0; i<pinkBufSize; i++) {
        var w = Math.random()*2-1;
        pb0=0.99886*pb0+w*0.0555179;
        pb1=0.99332*pb1+w*0.0750759;
        pb2=0.96900*pb2+w*0.1538520;
        pb3=0.86650*pb3+w*0.3104856;
        pb4=0.55000*pb4+w*0.5329522;
        pb5=-0.7616*pb5-w*0.0168980;
        out[i]=(pb0+pb1+pb2+pb3+pb4+pb5+w*0.5362)*0.11;
      }
    };
    // 低通 800Hz
    var breathFilter = audioCtx.createBiquadFilter();
    breathFilter.type = 'lowpass';
    breathFilter.frequency.value = 800;
    pinkNode.connect(breathFilter);
    breathFilter.connect(breathGain);
    // ScriptProcessor 需要连接输出才能运行 onaudioprocess，用静音节点避免直接输出
    var pinkSilent = audioCtx.createGain();
    pinkSilent.gain.value = 0;
    pinkNode.connect(pinkSilent);
    pinkSilent.connect(audioCtx.destination);
    audioNodes.pinkNode = pinkNode;
    audioNodes.breathFilter = breathFilter;

    // === 阶段音景层 ===
    // 建构层 Gain
    var constructGain = audioCtx.createGain();
    constructGain.gain.value = 0;
    constructGain.connect(masterGain);
    audioNodes.constructGain = constructGain;

    // 流转层 Gain
    var flowGain = audioCtx.createGain();
    flowGain.gain.value = 0;
    flowGain.connect(masterGain);
    audioNodes.flowGain = flowGain;

    // 消散层 Gain
    var dissolveGain = audioCtx.createGain();
    dissolveGain.gain.value = 0;
    dissolveGain.connect(masterGain);
    audioNodes.dissolveGain = dissolveGain;

    // 渐隐层 Gain
    var waneGain = audioCtx.createGain();
    waneGain.gain.value = 0;
    waneGain.connect(masterGain);
    audioNodes.waneGain = waneGain;

    // 建构层：432Hz 基频 + 864Hz 泛音（20%）
    var constructOsc1 = audioCtx.createOscillator();
    constructOsc1.type = 'sine';
    constructOsc1.frequency.value = AUDIO.baseFreq;
    var constructOsc2 = audioCtx.createOscillator();
    constructOsc2.type = 'sine';
    constructOsc2.frequency.value = AUDIO.baseFreq * 2;
    var harmonicGain1 = audioCtx.createGain();
    harmonicGain1.gain.value = 0.2;
    constructOsc1.connect(constructGain);
    constructOsc2.connect(harmonicGain1);
    harmonicGain1.connect(constructGain);
    constructOsc1.start();
    constructOsc2.start();
    audioNodes.constructOsc1 = constructOsc1;
    audioNodes.constructOsc2 = constructOsc2;

    // 流转层：432Hz + 428Hz（差拍）+ 白噪声低通
    var flowOsc1 = audioCtx.createOscillator();
    flowOsc1.type = 'sine';
    flowOsc1.frequency.value = AUDIO.baseFreq;
    var flowOsc2 = audioCtx.createOscillator();
    flowOsc2.type = 'sine';
    flowOsc2.frequency.value = AUDIO.baseFreq - 4;
    var flowNoiseBuf = audioCtx.createBufferSource();
    var noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    var noiseData = noiseBuf.getChannelData(0);
    for (var ni=0; ni<noiseData.length; ni++) noiseData[ni] = Math.random()*2-1;
    flowNoiseBuf.buffer = noiseBuf;
    flowNoiseBuf.loop = true;
    var flowNoiseFilter = audioCtx.createBiquadFilter();
    flowNoiseFilter.type = 'lowpass';
    flowNoiseFilter.frequency.value = 500;
    var flowNoiseGain = audioCtx.createGain();
    flowNoiseGain.gain.value = 0.03; // -30dB 约等于 0.032
    flowNoiseBuf.connect(flowNoiseFilter);
    flowNoiseFilter.connect(flowNoiseGain);
    flowNoiseGain.connect(flowGain);
    flowOsc1.connect(flowGain);
    flowOsc2.connect(flowGain);
    flowNoiseBuf.start();
    flowOsc1.start();
    flowOsc2.start();
    audioNodes.flowNoiseBuf = flowNoiseBuf;

    // 消散层：432Hz → 864Hz 滑音
    var dissolveOsc = audioCtx.createOscillator();
    dissolveOsc.type = 'sine';
    dissolveOsc.frequency.value = AUDIO.baseFreq;
    var dissolveOsc2 = audioCtx.createOscillator();
    dissolveOsc2.type = 'sine';
    dissolveOsc2.frequency.value = AUDIO.baseFreq * 2;
    var dissolveHarmGain = audioCtx.createGain();
    dissolveHarmGain.gain.value = 0.2;
    dissolveOsc.connect(dissolveGain);
    dissolveOsc2.connect(dissolveHarmGain);
    dissolveHarmGain.connect(dissolveGain);
    dissolveOsc.start();
    dissolveOsc2.start();
    audioNodes.dissolveOsc = dissolveOsc;
    audioNodes.dissolveOsc2 = dissolveOsc2;
    audioNodes.dissolveHarmGain = dissolveHarmGain;

    // 渐隐层：216Hz + 偶发泛音
    var waneOsc = audioCtx.createOscillator();
    waneOsc.type = 'sine';
    waneOsc.frequency.value = AUDIO.baseFreq / 2;
    waneOsc.connect(waneGain);
    waneOsc.start();
    audioNodes.waneOsc = waneOsc;
    // 偶发泛音用独立的 OscillatorNode（按需触发）
    audioNodes.waneHarmonicOsc = null;

    // 开始呼吸循环 + 阶段切换检查
    lastAudioPhase = -1;
    startBreathLoop();
    startPhaseCheckLoop();
  }

  // 呼吸包络计算
  function getBreathGain(elapsed) {
    var t = (elapsed % AUDIO.breathPeriod) / AUDIO.breathPeriod;
    if (t < 0.3) return t / 0.3;           // 吸：0→1 (1.2s)
    if (t < 0.4) return 1.0;               // 停：1 (0.4s)
    if (t < 0.9) return 1.0 - (t-0.4)/0.5;  // 呼：1→0 (2.0s)
    return 0;                              // 停：0 (0.4s)
  }

  // 呼吸层循环
  function startBreathLoop() {
    if (audioAnimFrame) cancelAnimationFrame(audioAnimFrame);
    function tickBreath() {
      if (!audioCtx || audioState === 0) {
        // 静音：确保呼吸层为0
        if (audioNodes.breathGain) audioNodes.breathGain.gain.value = 0;
        return;
      }
      var now = Date.now();
      var elapsed = (now - startTime) % CYCLE_DURATION;
      // 呼吸层只在 state=1 时开启
      if (audioState === 1 && AUDIO.breath) {
        var g = getBreathGain(elapsed);
        audioNodes.breathGain.gain.setTargetAtTime(g * 0.5, audioCtx.currentTime, 0.05);
      } else {
        audioNodes.breathGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
      }
      audioAnimFrame = requestAnimationFrame(tickBreath);
    }
    tickBreath();
  }

  // 阶段切换检查
  function checkAudioPhase() {
    if (!audioCtx || audioState === 0) return;
    var elapsed = (Date.now() - startTime) % CYCLE_DURATION;
    var phase = getPhase(elapsed);
    if (phase === lastAudioPhase) return;
    var now = audioCtx.currentTime;
    var xfadeTime = 0.5;

    audioNodes.constructGain.gain.setTargetAtTime(0, now, xfadeTime/3);
    audioNodes.flowGain.gain.setTargetAtTime(0, now, xfadeTime/3);
    audioNodes.dissolveGain.gain.setTargetAtTime(0, now, xfadeTime/3);
    audioNodes.waneGain.gain.setTargetAtTime(0, now, xfadeTime/3);

    if (phase === PHASE_CONSTRUCT && AUDIO.construct) {
      audioNodes.constructGain.gain.setTargetAtTime(0.8, now + xfadeTime*0.3, xfadeTime/3);
      audioNodes.constructGain.gain.setValueAtTime(0.001, now);
      audioNodes.constructGain.gain.linearRampToValueAtTime(0.8, now + 5);
    }
    if (phase === PHASE_FLOW && AUDIO.flow) {
      audioNodes.flowGain.gain.setTargetAtTime(0.6, now + xfadeTime*0.3, xfadeTime/3);
    }
    if (phase === PHASE_EMPTINESS && AUDIO.dissolve) {
      audioNodes.dissolveGain.gain.setTargetAtTime(0.6, now + xfadeTime*0.3, xfadeTime/3);
      var phaseElapsed = elapsed - 20000;
      var fadeIn = Math.min(1, phaseElapsed / 2000);
      var fadeOut = phaseElapsed > 5000 ? Math.max(0, 1 - (phaseElapsed - 5000) / 10000) : 1;
      var vol = 0.6 * fadeIn * fadeOut;
      audioNodes.dissolveGain.gain.setValueAtTime(vol, now);
      var freq = AUDIO.baseFreq + (AUDIO.baseFreq * 2 - AUDIO.baseFreq) * (phaseElapsed / 15000);
      audioNodes.dissolveOsc.frequency.setTargetAtTime(Math.min(freq, AUDIO.baseFreq * 2), now, 0.1);
      audioNodes.dissolveOsc2.frequency.setTargetAtTime(Math.min(freq * 2, AUDIO.baseFreq * 4), now, 0.1);
      var harmRatio = 0.2 + 0.2 * (phaseElapsed / 15000);
      audioNodes.dissolveHarmGain.gain.setTargetAtTime(Math.min(harmRatio, 0.4), now, 0.1);
    }
    if (phase === PHASE_WANE && AUDIO.wane) {
      audioNodes.waneGain.gain.setTargetAtTime(0.3, now + xfadeTime*0.3, xfadeTime/3);
      startWaneHarmonics();
    } else {
      stopWaneHarmonics();
    }

    lastAudioPhase = phase;
  }

  function startPhaseCheckLoop() {
    if (audioPhaseCheckTimer) clearInterval(audioPhaseCheckTimer);
    audioPhaseCheckTimer = setInterval(checkAudioPhase, 200);
    checkAudioPhase(); // 立即执行一次，消除 200ms 延迟
  }

  // 渐隐层偶发泛音
  var waneHarmonicTimer = null;
  function startWaneHarmonics() {
    if (waneHarmonicTimer) return;
    waneHarmonicTimer = setInterval(function() {
      if (!audioCtx || lastAudioPhase !== PHASE_WANE) return;
      // 648Hz 短促泛音
      var osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = AUDIO.baseFreq * 1.5;
      var gain = audioCtx.createGain();
      gain.gain.value = 0.018; // ~-35dB
      osc.connect(gain);
      gain.connect(audioNodes.waneGain);
      osc.start();
      gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.1, 0.1);
      osc.stop(audioCtx.currentTime + 0.5);
    }, 4000);
  }
  function stopWaneHarmonics() {
    if (waneHarmonicTimer) { clearInterval(waneHarmonicTimer); waneHarmonicTimer = null; }
  }

  // 音频控件交互
  var audioIcons = ['\u{1F507}', '\u{1F508}', '\u{1F50A}']; // 🔇🔈🔊
  btnAudio.addEventListener('click', function() {
    if (audioState === 0) {
      // 静音 → 开启（呼吸+音景）
      initAudioEngine();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      audioState = 1;
      btnAudio.classList.add('active');
    } else if (audioState === 1) {
      // 呼吸+音景 → 仅音景
      audioState = 2;
    } else {
      // 仅音景 → 静音
      audioState = 0;
      // 静音所有层
      var now = audioCtx.currentTime;
      audioNodes.breathGain.gain.setTargetAtTime(0, now, 0.05);
      audioNodes.constructGain.gain.setTargetAtTime(0, now, 0.1);
      audioNodes.flowGain.gain.setTargetAtTime(0, now, 0.1);
      audioNodes.dissolveGain.gain.setTargetAtTime(0, now, 0.1);
      audioNodes.waneGain.gain.setTargetAtTime(0, now, 0.1);
      stopWaneHarmonics();
      lastAudioPhase = -1;
      btnAudio.classList.remove('active');
    }
    btnAudio.innerHTML = audioIcons[audioState];
    // 保存状态
    try { localStorage.setItem(STORAGE_KEY + '_audio_state', audioState); } catch(e) {}
  });

  sliderAudio.addEventListener('input', function() {
    var val = parseInt(this.value);
    var vol = val / 100 * 0.1; // 0~0.1
    AUDIO.masterVolume = vol;
    if (audioNodes.masterGain) {
      audioNodes.masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
    }
    try { localStorage.setItem(STORAGE_KEY + '_audio_vol', val); } catch(e) {}
  });

  // 恢复保存的音频状态
  try {
    var savedState = localStorage.getItem(STORAGE_KEY + '_audio_state');
    if (savedState) {
      var s = parseInt(savedState);
      if (s >= 0 && s <= 2) {
        audioState = s;
        btnAudio.innerHTML = audioIcons[audioState];
        if (s > 0) btnAudio.classList.add('active');
        if (s > 0) {
          initAudioEngine();
          if (audioCtx.state === 'suspended') audioCtx.resume();
        }
      }
    }
    var savedVol = localStorage.getItem(STORAGE_KEY + '_audio_vol');
    if (savedVol) sliderAudio.value = savedVol;
  } catch(e) {}

  // === 绘制函数 ===

  function drawBackground() {
    // 空三：觉知域 · 画布呼吸
    var bShift = 0;
    if (EMPTINESS.breath) {
      var bT = Date.now() % EMPTINESS.breathPeriod / EMPTINESS.breathPeriod;
      bShift = Math.sin(bT * Math.PI * 2) * EMPTINESS.breathAmplitude;
    }
    var cR = Math.round(20 + bShift);
    var cG = Math.round(19 + bShift);
    var cB = Math.round(48 + bShift);
    var cR2 = Math.round(10 + bShift);
    var cG2 = Math.round(10 + bShift);
    var cB2 = Math.round(26 + bShift);
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    grad.addColorStop(0, 'rgb(' + cR + ',' + cG + ',' + cB + ')');
    grad.addColorStop(1, 'rgb(' + cR2 + ',' + cG2 + ',' + cB2 + ')');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
  }

  function drawMobiusRing(ring, ringIdx, globalAlpha, fadeInScale) {
    var R = ring.R * zoomScale * fadeInScale;
    var w = ring.w * zoomScale * fadeInScale;
    var yOff = ring.yOffset * zoomScale * fadeInScale;
    var rgb = hexToRgb(ring.color);
    var uStep = 0.08;
    var vSteps = 4;
    var vStep = (w * 2) / vSteps;
    var quads = [];

    // 生成网格
    for (var ui = 0; ui < Math.floor(2 * Math.PI / uStep); ui++) {
      var u0 = ui * uStep;
      var u1 = (ui + 1) * uStep;
      for (var vi = 0; vi < vSteps; vi++) {
        var v0 = -w + vi * vStep;
        var v1 = -w + (vi + 1) * vStep;
        var p00 = mobiusPoint(u0, v0, R, w);
        var p10 = mobiusPoint(u1, v0, R, w);
        var p11 = mobiusPoint(u1, v1, R, w);
        var p01 = mobiusPoint(u0, v1, R, w);
        // 添加y偏移
        p00[1] += yOff; p10[1] += yOff; p11[1] += yOff; p01[1] += yOff;
        var s00 = project(p00, rotY, rotX);
        var s10 = project(p10, rotY, rotX);
        var s11 = project(p11, rotY, rotX);
        var s01 = project(p01, rotY, rotX);
        var avgZ = (s00.z + s10.z + s11.z + s01.z) / 4;
        quads.push({ pts: [s00, s10, s11, s01], avgZ: avgZ, rgb: rgb, alpha: globalAlpha });
      }
    }

    // 画家算法排序
    quads.sort(function(a, b) { return a.avgZ - b.avgZ; });

    // 绘制
    quads.forEach(function(q) {
      ctx.beginPath();
      ctx.moveTo(q.pts[0].x, q.pts[0].y);
      ctx.lineTo(q.pts[1].x, q.pts[1].y);
      ctx.lineTo(q.pts[2].x, q.pts[2].y);
      ctx.lineTo(q.pts[3].x, q.pts[3].y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(' + q.rgb[0] + ',' + q.rgb[1] + ',' + q.rgb[2] + ',' + (0.12 * q.alpha) + ')';
      ctx.fill();
      ctx.strokeStyle = 'rgba(' + q.rgb[0] + ',' + q.rgb[1] + ',' + q.rgb[2] + ',' + (0.35 * q.alpha) + ')';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    });
  }

  function drawConceptNodes(ring, ringIdx, elapsed, globalAlpha, fadeInScale) {
    var R = ring.R * zoomScale * fadeInScale;
    var w = ring.w * zoomScale * fadeInScale;
    var yOff = ring.yOffset * zoomScale * fadeInScale;
    var nCount = ring.concepts.length;

    // 空四：为道日损 · 节点渐隐
    var nodeAlphaOverride = 1.0;
    var elapsed4 = (Date.now() - startTime) % CYCLE_DURATION;
    if (EMPTINESS.wane && elapsed4 >= EMPTINESS.fadeStart) {
      var fadeP = Math.min(1, (elapsed4 - EMPTINESS.fadeStart) / (EMPTINESS.fadeEnd - EMPTINESS.fadeStart));
      nodeAlphaOverride = 1 - fadeP * (1 - EMPTINESS.fadeTarget);
    }
    // 拖拽交互时恢复
    if (isDragging && EMPTINESS.wane) {
      nodeAlphaOverride = Math.max(nodeAlphaOverride, EMPTINESS.fadeRestore);
    }

    for (var i = 0; i < nCount; i++) {
      var concept = ring.concepts[i];
      // 概念出现的延迟动画
      var conceptDelay = ringIdx * 2 + i * 0.3;
      if (elapsed < conceptDelay) continue;
      var conceptAlpha = Math.min(1, (elapsed - conceptDelay) / 0.8);
      conceptAlpha *= globalAlpha;
      conceptAlpha *= nodeAlphaOverride;

      var u = (i / nCount) * Math.PI * 2;
      var vOffset = (i % 2 === 0 ? 1 : -1) * w * 0.15;
      var pt = mobiusPoint(u, vOffset, R, w);
      pt[1] += yOff;
      var proj = project(pt, rotY, rotX);
      var baseR = 12 * proj.s * zoomScale;
      var r = Math.max(3, baseR);
      var isHovered = hoveredNode && hoveredNode.label === concept.label;

      // 记录投影位置用于悬停检测
      projectedNodes.push({
        px: proj.px || proj.x,
        py: proj.py || proj.y,
        r: r,
        label: concept.label,
        desc: concept.desc,
        docs: concept.docs,
        color: ring.color,
        z: proj.z,
        wuxing: concept.wuxing,
        bagua: concept.bagua,
        ringLabel: ring.label
      });
      var pRef = projectedNodes[projectedNodes.length - 1];
      pRef.px = proj.x;
      pRef.py = proj.y;

      // 光晕
      var glowR = isHovered ? r * 3.5 : r * 2.5;
      var glow = ctx.createRadialGradient(proj.x, proj.y, 0, proj.x, proj.y, glowR);
      var rgb = hexToRgb(ring.color);
      glow.addColorStop(0, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + (0.4 * conceptAlpha) + ')');
      glow.addColorStop(1, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0)');
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // 实心圆
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, isHovered ? r * 1.4 : r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + (0.9 * conceptAlpha) + ')';
      ctx.fill();

      // 内核亮点
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (0.7 * conceptAlpha) + ')';
      ctx.fill();

      // 标签
      if (conceptAlpha > 0.3) {
        ctx.font = (isHovered ? '13' : '11') + 'px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + (conceptAlpha * 0.95) + ')';
        ctx.fillText(concept.label, proj.x, proj.y + r + 16);
      }

      // 空二：节点倒影
      if (EMPTINESS.mirror && conceptAlpha > 0.1) {
        var mirrorY = proj.y + r + 4;
        var mirrorAlpha = conceptAlpha * 0.08;
        ctx.save();
        ctx.translate(proj.x, mirrorY);
        ctx.scale(1, -0.3);
        ctx.beginPath();
        ctx.arc(0, 0, isHovered ? r * 1.4 : r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + mirrorAlpha + ')';
        ctx.fill();
        ctx.restore();
      }
    }
  }

  // === 流动箭头 ===
  function drawFlowArrows(elapsed, alpha) {
    if (alpha <= 0) return;
    var t = elapsed * 0.001;
    var dashOffset = -t * 60;

    // 种子→现行 (右侧上升)
    drawCurvedArrow(
      cx + 220 * zoomScale, cy + 60 * zoomScale,
      cx + 160 * zoomScale, cy - 40 * zoomScale,
      '#4ECDC4', '#FF6B6B', '种子生现行', dashOffset, alpha, 1
    );

    // 现行→种子 (左侧下降)
    drawCurvedArrow(
      cx - 160 * zoomScale, cy + 40 * zoomScale,
      cx - 220 * zoomScale, cy - 60 * zoomScale,
      '#FF6B6B', '#4ECDC4', '现行熏种子', -dashOffset, alpha, -1
    );

    // 现行→超越 (中心上升)
    drawCurvedArrow(
      cx + 20 * zoomScale, cy - 50 * zoomScale,
      cx + 20 * zoomScale, cy - 130 * zoomScale,
      '#FF6B6B', '#FFD93D', '转依', dashOffset * 1.3, alpha, 0.3
    );
  }

  function drawCurvedArrow(x1, y1, x2, y2, color1, color2, label, dashOff, alpha, curve) {
    var mx = (x1 + x2) / 2 + 40 * curve * zoomScale;
    var my = (y1 + y2) / 2;
    var grad = ctx.createLinearGradient(x1, y1, x2, y2);
    var rgb1 = hexToRgb(color1);
    var rgb2 = hexToRgb(color2);
    grad.addColorStop(0, 'rgba(' + rgb1[0] + ',' + rgb1[1] + ',' + rgb1[2] + ',' + (0.8 * alpha) + ')');
    grad.addColorStop(1, 'rgba(' + rgb2[0] + ',' + rgb2[1] + ',' + rgb2[2] + ',' + (0.8 * alpha) + ')');

    ctx.save();
    ctx.setLineDash([8, 6]);
    ctx.lineDashOffset = dashOff;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(mx, my, x2, y2);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);

    // 箭头头部
    var angle = Math.atan2(y2 - my, x2 - mx);
    var aSize = 8 * zoomScale;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - aSize * Math.cos(angle - 0.4), y2 - aSize * Math.sin(angle - 0.4));
    ctx.lineTo(x2 - aSize * Math.cos(angle + 0.4), y2 - aSize * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = 'rgba(' + rgb2[0] + ',' + rgb2[1] + ',' + rgb2[2] + ',' + (0.9 * alpha) + ')';
    ctx.fill();

    // 标签
    var lx = mx + 10 * curve;
    var ly = my - 8;
    ctx.font = '12px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,' + (0.7 * alpha) + ')';
    ctx.fillText(label, lx, ly);
    ctx.restore();
  }

  // === 粒子绘制 ===
  function updateAndDrawParticles(alpha) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.t += p.speed;
      if (p.t > 1) {
        particles.splice(i, 1);
        continue;
      }

      // 空五：上旋粒子渲染
      if (p.type === 'ascend') {
        var aT = p.t;
        var aY = p.startY + (p.endY - p.startY) * aT;
        var aX = p.startX + Math.sin(aT * Math.PI * 3) * 15 * zoomScale;
        var aColor;
        if (aT < 0.33) {
          aColor = p.color1;
        } else if (aT < 0.66) {
          aColor = p.color2;
        } else if (aT < 0.9) {
          aColor = p.color3;
        } else {
          aColor = '#FFFFFF';
        }
        var aAlpha = aT < 0.9 ? alpha : alpha * (1 - (aT - 0.9) / 0.1);
        var aRgb = hexToRgb(aColor);
        var aGlow = ctx.createRadialGradient(aX, aY, 0, aX, aY, 5);
        aGlow.addColorStop(0, 'rgba(' + aRgb[0] + ',' + aRgb[1] + ',' + aRgb[2] + ',' + (0.9 * aAlpha) + ')');
        aGlow.addColorStop(1, 'rgba(' + aRgb[0] + ',' + aRgb[1] + ',' + aRgb[2] + ',0)');
        ctx.beginPath();
        ctx.arc(aX, aY, 5, 0, Math.PI * 2);
        ctx.fillStyle = aGlow;
        ctx.fill();
        continue;
      }

      var x1, y1, x2, y2;
      if (p.fromRing === 0 && p.toRing === 1) {
        x1 = cx + 220 * zoomScale; y1 = cy + 60 * zoomScale;
        x2 = cx + 160 * zoomScale; y2 = cy - 40 * zoomScale;
      } else if (p.fromRing === 1 && p.toRing === 0) {
        x1 = cx - 160 * zoomScale; y1 = cy + 40 * zoomScale;
        x2 = cx - 220 * zoomScale; y2 = cy - 60 * zoomScale;
      } else {
        x1 = cx + 20 * zoomScale; y1 = cy - 50 * zoomScale;
        x2 = cx + 20 * zoomScale; y2 = cy - 130 * zoomScale;
      }
      var t = p.t;
      var curve = p.side * 40 * zoomScale;
      var mx = (x1 + x2) / 2 + curve;
      var my = (y1 + y2) / 2;
      var px = (1 - t) * (1 - t) * x1 + 2 * (1 - t) * t * mx + t * t * x2;
      var py = (1 - t) * (1 - t) * y1 + 2 * (1 - t) * t * my + t * t * y2;
      var rgb = hexToRgb(p.color);
      var glow = ctx.createRadialGradient(px, py, 0, px, py, 6);
      glow.addColorStop(0, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + (0.9 * alpha) + ')');
      glow.addColorStop(1, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0)');
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }
  }

  // === 三轮体空动画 ===
  function drawThreeWheelEmptiness(progress) {
    // 空一：粒子在三轮体空阶段逐渐减速
    // progress: 0~1
    var orbitR = 80 * zoomScale;
    var cx3 = cx, cy3 = cy;

    // 三个圆的标签
    var labels = ['施者', '受者', '施事'];
    var angles = [0, 2 * Math.PI / 3, 4 * Math.PI / 3];
    var positions = [];

    if (progress < 0.6) {
      // 轨道阶段
      var orbitAlpha = Math.min(1, progress / 0.1);
      var orbitSpeed = progress * 4;
      for (var i = 0; i < 3; i++) {
        var a = angles[i] + orbitSpeed;
        var px = cx3 + orbitR * Math.cos(a);
        var py = cy3 + orbitR * Math.sin(a) * 0.4;
        positions.push({ x: px, y: py, alpha: orbitAlpha });
      }

      // 画轨道
      ctx.beginPath();
      ctx.ellipse(cx3, cy3, orbitR, orbitR * 0.4, 0, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,217,61,' + (0.2 * orbitAlpha) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      // 合并阶段
      var mergeP = (progress - 0.6) / 0.4; // 0~1
      for (var i = 0; i < 3; i++) {
        var a = angles[i] + 2.4; // 最终角度
        var fullX = cx3 + orbitR * Math.cos(a);
        var fullY = cy3 + orbitR * Math.sin(a) * 0.4;
        var px = fullX + (cx3 - fullX) * mergeP;
        var py = fullY + (cy3 - fullY) * mergeP;
        positions.push({ x: px, y: py, alpha: Math.max(0, 1 - mergeP * 0.8) });
      }
    }

    // 画三个圆
    for (var i = 0; i < 3; i++) {
      var p = positions[i];
      if (p.alpha <= 0) continue;
      // 光晕
      var glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 40);
      glow.addColorStop(0, 'rgba(255,217,61,' + (0.3 * p.alpha) + ')');
      glow.addColorStop(1, 'rgba(255,217,61,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, 40, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
      // 圆
      ctx.beginPath();
      ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,217,61,' + (0.15 * p.alpha) + ')';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,217,61,' + (0.8 * p.alpha) + ')';
      ctx.lineWidth = 2;
      ctx.stroke();
      // 文字
      ctx.font = '16px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,217,61,' + p.alpha + ')';
      ctx.fillText(labels[i], p.x, p.y);
    }

    // 合并后的亮点 (progress 0.6~0.8)
    if (progress >= 0.6 && progress < 0.8) {
      var brightP = (progress - 0.6) / 0.2;
      var glowR = 30 + brightP * 60;
      var glow = ctx.createRadialGradient(cx3, cy3, 0, cx3, cy3, glowR);
      glow.addColorStop(0, 'rgba(255,255,255,' + (0.9 * brightP) + ')');
      glow.addColorStop(0.3, 'rgba(255,217,61,' + (0.7 * brightP) + ')');
      glow.addColorStop(1, 'rgba(255,217,61,0)');
      ctx.beginPath();
      ctx.arc(cx3, cy3, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // 扩散消散 (progress 0.8~0.85)
    if (progress >= 0.8 && progress < 0.85) {
      var expandP = (progress - 0.8) / 0.05;
      var expandR = 90 + expandP * 200;
      ctx.beginPath();
      ctx.arc(cx3, cy3, expandR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,217,61,' + (0.4 * (1 - expandP)) + ')';
      ctx.lineWidth = 3 * (1 - expandP);
      ctx.stroke();
    }

    // "空"字 (progress 0.85~1.0)
    if (progress >= 0.85) {
      var charP = (progress - 0.85) / 0.1;
      var charAlpha = Math.min(1, charP * 2);
      var fadeAlpha = progress > 0.95 ? (1 - progress) / 0.05 : 1;
      var finalAlpha = charAlpha * fadeAlpha;
      if (finalAlpha > 0.01) {
        var fontSize = Math.floor(120 * zoomScale);
        ctx.font = 'bold ' + fontSize + 'px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 外发光
        ctx.shadowColor = 'rgba(255,217,61,0.8)';
        ctx.shadowBlur = 40;
        ctx.fillStyle = 'rgba(255,217,61,' + finalAlpha + ')';
        ctx.fillText('空', cx3, cy3);
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.shadowBlur = 20;
        ctx.fillText('空', cx3, cy3);
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
      }
    }
  }

  // === 中心文字 ===
  function drawCenterText(alpha) {
    if (alpha <= 0.01) return;
    ctx.font = '13px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,' + (0.35 * alpha) + ')';
    ctx.fillText('种子 → 现行 → 熏习 → 种子', cx, cy);
  }

  // === 主渲染循环 ===
  function render() {
    var now = Date.now();
    var elapsed = (now - startTime) % CYCLE_DURATION;
    var phase = getPhase(elapsed);
    var phaseProg = getPhaseProgress(elapsed);

    // 更新UI指示
    document.getElementById('phase-indicator').textContent = phaseNames[phase];
    var ptEl = document.getElementById('phase-text');
    ptEl.textContent = PHASE_TEXTS[phase] || '';
    if (phase === PHASE_EMPTINESS) {
      ptEl.style.opacity = Math.min(1, phaseProg * 3);
    } else if (phase === PHASE_WANE) {
      ptEl.style.opacity = Math.min(0.4, phaseProg * 0.5);
    } else {
      ptEl.style.opacity = 0;
    }

    // 旋转
    if (!isDragging) {
      if (Math.abs(dragVelY) > 0.0001 || Math.abs(dragVelX) > 0.0001) {
        rotY += dragVelY;
        rotX += dragVelX;
        rotX = Math.max(-1.2, Math.min(1.2, rotX));
        dragVelY *= 0.96;
        dragVelX *= 0.96;
      } else {
        var phaseMultiplier = phase === PHASE_EMPTINESS ? 0.3 : 1;
        rotY += autoRotSpeed * phaseMultiplier;
      }
    }

    // 清空
    projectedNodes = [];
    drawBackground();

    // 各阶段的全局透明度
    var mainAlpha = 1;
    var phase3Alpha = 0;

    if (phase === PHASE_CONSTRUCT) {
      mainAlpha = Math.min(1, phaseProg + 0.3);
    } else if (phase === PHASE_EMPTINESS) {
      if (phaseProg < 0.3) {
        mainAlpha = 1;
        phase3Alpha = 0;
      } else if (phaseProg < 0.5) {
        var fadeP = (phaseProg - 0.3) / 0.2;
        mainAlpha = 1 - fadeP * 0.5;
        phase3Alpha = fadeP;
      } else {
        mainAlpha = Math.max(0.4, 0.5 - (phaseProg - 0.5) * 0.2);
        phase3Alpha = 1;
      }
    } else if (phase === PHASE_WANE) {
      // 空四：为道日损阶段，节点渐隐由 drawConceptNodes 内部处理
      mainAlpha = 0.6;
      phase3Alpha = 0;
    }

    // 绘制莫比乌斯环
    for (var ri = 0; ri < rings.length; ri++) {
      var ring = rings[ri];
      var fadeInScale = 1;
      if (phase === PHASE_CONSTRUCT) {
        var ringStart = ri * 2;
        var ringProg = Math.max(0, Math.min(1, (elapsed - ringStart) / 1.5));
        fadeInScale = ringProg;
        if (fadeInScale <= 0) continue;
      }
      drawMobiusRing(ring, ri, mainAlpha, fadeInScale);
    }

    // 空二：大圆镜智 · 背景镜面（环之后、节点之前，确保不被遮挡）
    if (EMPTINESS.mirror) {
      // 动态适配视口：取高度和宽度的较小比例，留出上下标注空间
      var mR = Math.min(H * EMPTINESS.mirrorRatio, W * EMPTINESS.mirrorRatio) * zoomScale;
      var mGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, mR);
      mGrd.addColorStop(0, 'rgba(255,217,61,0.15)');
      mGrd.addColorStop(0.35, 'rgba(255,217,61,0.08)');
      mGrd.addColorStop(0.65, 'rgba(255,217,61,0.03)');
      mGrd.addColorStop(1, 'rgba(10,10,26,0)');
      ctx.fillStyle = mGrd;
      ctx.beginPath();
      ctx.arc(cx, cy, mR, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, mR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,217,61,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, mR * 0.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,217,61,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // 绘制概念节点
    for (var ri = 0; ri < rings.length; ri++) {
      var ring = rings[ri];
      var fadeInScale = 1;
      if (phase === PHASE_CONSTRUCT) {
        var ringStart = ri * 2;
        var ringProg = Math.max(0, Math.min(1, (elapsed - ringStart) / 1.5));
        fadeInScale = ringProg;
        if (fadeInScale <= 0) continue;
      }
      drawConceptNodes(ring, ri, elapsed, mainAlpha, fadeInScale);
    }

    // 流动箭头
    if (phase === PHASE_CONSTRUCT) {
      var arrowAlpha = Math.max(0, Math.min(1, (elapsed - 6) / 1.5));
      drawFlowArrows(elapsed, arrowAlpha * mainAlpha);
    } else if (phase === PHASE_FLOW) {
      drawFlowArrows(elapsed, mainAlpha);
      drawCenterText(Math.min(1, phaseProg * 3));
      // 生成粒子
      if (Math.random() < 0.3) spawnParticle(0, 1, '#4ECDC4');
      if (Math.random() < 0.3) spawnParticle(1, 0, '#FF6B6B');
      if (Math.random() < 0.15) spawnParticle(1, 2, '#FFD93D');

      // 空五：色空不二 · 粒子上旋穿透
      if (EMPTINESS.ascend && phase === PHASE_EMPTINESS) {
        if (Math.random() < EMPTINESS.ascendRatio * 0.3) {
          particles.push({
            t: 0, speed: 0.012 + Math.random() * 0.008,
            type: 'ascend', color1: '#4ECDC4', color2: '#FF6B6B', color3: '#FFD93D',
            startY: cy + 120 * zoomScale,
            endY: cy - 120 * zoomScale,
            startX: cx + (Math.random() - 0.5) * 100 * zoomScale
          });
        }
      }
    } else if (phase === PHASE_EMPTINESS) {
      drawFlowArrows(elapsed, mainAlpha * 0.3);
      // 空五：色空不二 · 粒子上旋穿透
      if (EMPTINESS.ascend) {
        if (Math.random() < EMPTINESS.ascendRatio * 0.3) {
          particles.push({
            t: 0, speed: 0.012 + Math.random() * 0.008,
            type: 'ascend', color1: '#4ECDC4', color2: '#FF6B6B', color3: '#FFD93D',
            startY: cy + 120 * zoomScale,
            endY: cy - 120 * zoomScale,
            startX: cx + (Math.random() - 0.5) * 100 * zoomScale
          });
        }
      }
    } else if (phase === PHASE_WANE) {
      drawFlowArrows(elapsed, mainAlpha * 0.15);
    }

    // 绘制粒子
    updateAndDrawParticles(mainAlpha);

    // 三轮体空
    if (phase === PHASE_EMPTINESS && phase3Alpha > 0) {
      drawThreeWheelEmptiness(phaseProg);
    }

    // 循环末尾淡出（所有阶段最后5%）
    if (phase === PHASE_EMPTINESS && phaseProg > 0.93) {
      var fadeOut = 1 - (phaseProg - 0.93) / 0.07;
      ctx.fillStyle = 'rgba(10,10,26,' + (1 - fadeOut) + ')';
      ctx.fillRect(0, 0, W, H);
    } else if (phase === PHASE_WANE && phaseProg > 0.93) {
      var fadeOut2 = 1 - (phaseProg - 0.93) / 0.07;
      ctx.fillStyle = 'rgba(10,10,26,' + (1 - fadeOut2) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    requestAnimationFrame(render);
  }

  render();

  console.log('🎯 莫比乌斯概念地图 v2.0 — 五空动画 · 种子·现行·三轮体空·为道日损');
})();
</script>
