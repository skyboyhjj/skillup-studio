    vx:0, vy:0, r:r,

  nodeMap[n.id]=n;

  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// 图例
(function(){
  var leg=document.getElementById('legend');
  for(var k in CAT){
    var d=document.createElement('div');d.className='legend-item';
    d.innerHTML='<span class="legend-dot" style="background:'+CAT[k].color+'"></span>'+CAT[k].label;
    leg.appendChild(d);
  }
})();

// ===== 力模拟 =====
function simulate(){
  var alpha=0.5, alphaMin=0.001, alphaDecay=0.02;
  var maxIter=120;
  
  for(var iter=0;iter<maxIter;iter++){
    if(alpha<alphaMin) break;
    
    // 斥力 (many-body)
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var a=nodes[i], b=nodes[j];
        var dx=b.x-a.x, dy=b.y-a.y;
        var dist=Math.sqrt(dx*dx+dy*dy)||1;
        var force=800/(dist*dist)*alpha;
        var fx=dx/dist*force, fy=dy/dist*force;
        if(!a.fixed){a.vx-=fx;a.vy-=fy}
        if(!b.fixed){b.vx+=fx;b.vy+=fy}
      }
    }
    
    // 引力 (links)
    for(var i=0;i<edges.length;i++){
      var e=edges[i], s=e.source, t=e.target;
      var dx=t.x-s.x, dy=t.y-s.y;
      var dist=Math.sqrt(dx*dx+dy*dy)||1;
      var force=(dist-160)*0.01*alpha;
      var fx=dx/dist*force, fy=dy/dist*force;
      if(!s.fixed){s.vx+=fx;s.vy+=fy}
      if(!t.fixed){t.vx-=fx;t.vy-=fy}
    }
    
    // 中心引力
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i];
      if(!n.fixed){
        n.vx-=n.x*0.002*alpha;
        n.vy-=n.y*0.002*alpha;
      }
    }
    
    // 碰撞
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var a=nodes[i], b=nodes[j];
        var dx=b.x-a.x, dy=b.y-a.y;
        var dist=Math.sqrt(dx*dx+dy*dy)||1;
        var minDist=a.r+b.r+8;
        if(dist<minDist){
          var force=(minDist-dist)*0.5;
          var fx=dx/dist*force, fy=dy/dist*force;
          if(!a.fixed){a.vx-=fx;a.vy-=fy}
          if(!b.fixed){b.vx+=fx;b.vy+=fy}
        }
      }
    }
    
    // 阻尼
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i];
      if(!n.fixed){n.vx*=0.6;n.vy*=0.6}
    }
    
    alpha*=1-alphaDecay;
  }
  
  // 应用速度
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(!n.fixed){
      n.x+=n.vx; n.y+=n.vy;
      n.x=Math.max(-800,Math.min(800,n.x));
      n.y=Math.max(-600,Math.min(600,n.y));
    }
  }
}

// ===== 渲染 =====
function toScreen(x,y){
  return {x:(x+panX)*zoomLevel+W/2, y:(y+panY)*zoomLevel+H/2};
}
function fromScreen(sx,sy){
  return {x:(sx-W/2)/zoomLevel-panX, y:(sy-H/2)/zoomLevel-panY};
}

var relatedSet=new Set();
function updateRelated(hid){
  relatedSet.clear();
  if(!hid) return;
  relatedSet.add(hid);
  for(var i=0;i<edges.length;i++){
    var e=edges[i];
    if(e.source.id===hid) relatedSet.add(e.target.id);
    if(e.target.id===hid) relatedSet.add(e.source.id);
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  
  // 背景网格
  ctx.strokeStyle='rgba(255,255,255,0.015)';
  ctx.lineWidth=1;
  var gs=40*zoomLevel;
  var ox=(panX*zoomLevel+W/2)%gs, oy=(panY*zoomLevel+H/2)%gs;
  for(var x=ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=oy;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  
  var searchSet=null;
  if(searchQuery){
    searchSet=new Set();
    var q=searchQuery.toLowerCase();
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i];
      if(n.id.toLowerCase().includes(q)||n.label.toLowerCase().includes(q)||n.desc.toLowerCase().includes(q))
        searchSet.add(n.id);
    }
    document.getElementById('search-count').textContent=searchSet.size+'/'+nodes.length;
  }
  
  // 连线
  for(var i=0;i<edges.length;i++){
    var e=edges[i];
    var sp=toScreen(e.source.x,e.source.y);
    var tp=toScreen(e.target.x,e.target.y);
    
    var alpha=0.35;
    if(hovered&&(e.source.id===hovered.id||e.target.id===hovered.id)) alpha=0.7;
    else if(hovered) alpha=0.06;
    if(searchSet){
      if(searchSet.has(e.source.id)&&searchSet.has(e.target.id)) alpha=0.5;
      else alpha=0.03;
    }
    if(alpha<0.03) continue;
    
    ctx.strokeStyle=gc(e.source.cat);
    ctx.globalAlpha=alpha;
    ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y);ctx.stroke();
    ctx.globalAlpha=1;
    
    // 标签
    if(alpha>0.3){
      var mx=(sp.x+tp.x)/2, my=(sp.y+tp.y)/2-6;
      ctx.fillStyle='rgba(255,255,255,'+(alpha*0.6)+')';
      ctx.font='9px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(e.label,mx,my);
    }
  }
  
  // 连线（搜索时的高亮）
  if(hovered){
    for(var i=0;i<edges.length;i++){
      var e=edges[i];
      if(e.source.id===hovered.id||e.target.id===hovered.id){
        var sp=toScreen(e.source.x,e.source.y);
        var tp=toScreen(e.target.x,e.target.y);
        // glow
        ctx.strokeStyle=hovered.color;
        ctx.globalAlpha=0.1;
        ctx.lineWidth=5;
        ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
  }
  
  // 节点
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    var p=toScreen(n.x,n.y);
    
    var alpha=1;
    if(hovered){
      if(relatedSet.has(n.id)) alpha=1;
      else alpha=0.15;
    }
    if(searchSet){
      if(searchSet.has(n.id)) alpha=1;
      else alpha=0.08;
    }
    if(alpha<0.08) continue;
    
    // 光晕
    if((hovered&&relatedSet.has(n.id))||(selectedNode&&selectedNode.id===n.id)){
      ctx.shadowColor=n.color;
      ctx.shadowBlur=18;
    }
    
    ctx.globalAlpha=alpha;
    ctx.fillStyle=n.color;
    ctx.beginPath();ctx.arc(p.x,p.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.shadowBlur=0;
    
    // 标签
    var txt=n.label;
    if(txt.length>8) txt=txt.slice(0,7)+'…';
    ctx.fillStyle='rgba(255,255,255,'+(alpha*0.9)+')';
    ctx.font=(n.id==='alaya'?'bold 12px':n.r>20?'bold 11px':'10px')+' sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(txt,p.x,p.y);
    ctx.globalAlpha=1;
  }
}

// ===== 交互 =====
function hitTest(sx,sy){
  var wp=fromScreen(sx,sy);
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];
    var dx=wp.x-n.x, dy=wp.y-n.y;
    if(Math.sqrt(dx*dx+dy*dy)<n.r+4) return n;
  }
  return null;
}

canvas.addEventListener('mousedown',function(e){
  var n=hitTest(e.clientX,e.clientY);
  if(n){
    dragging=n;
    dragOX=n.x; dragOY=n.y;
    n.fixed=true;
    canvas.style.cursor='grabbing';
  }else{
    panning=true;
    panSX=e.clientX; panSY=e.clientY;
    canvas.style.cursor='move';
  }
});

window.addEventListener('mousemove',function(e){
  if(dragging){
    var p=fromScreen(e.clientX,e.clientY);
    dragging.x=p.x; dragging.y=p.y;
  }else if(panning){
    var dx=(e.clientX-panSX)/zoomLevel;
    var dy=(e.clientY-panSY)/zoomLevel;
    panX+=dx; panY+=dy;
    panSX=e.clientX; panSY=e.clientY;
  }else{
    var n=hitTest(e.clientX,e.clientY);
    if(n!==hovered){
      hovered=n;
      updateRelated(n?n.id:null);
      canvas.style.cursor=n?'pointer':'default';
      // tooltip
      var tt=document.getElementById('tooltip');
      if(n){
        tt.style.display='block';
        tt.style.left=(e.clientX+18)+'px';
        tt.style.top=(e.clientY-10)+'px';
        tt.innerHTML='<div class="tt-name">'+n.label+'</div><div class="tt-cat">'+gl(n.cat)+'</div><div class="tt-desc">'+n.desc+'</div>';
      }else{
        tt.style.display='none';
      }
    }
  }
});

window.addEventListener('mouseup',function(){
  if(dragging){
    dragging.fixed=false;
    dragging=null;
    canvas.style.cursor=hovered?'pointer':'default';
  }
  panning=false;
});

canvas.addEventListener('click',function(e){
  if(dragging) return; // was a drag
  var n=hitTest(e.clientX,e.clientY);
  if(n){
    selectedNode=n;
    showDetail(n);
  }
});

canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var delta=e.deltaY>0?0.9:1.1;
  var newZoom=Math.max(0.1,Math.min(4,zoomLevel*delta));
  // zoom toward cursor
  var mx=e.clientX, my=e.clientY;
  var ratio=newZoom/zoomLevel;
  panX=(panX+mx/zoomLevel)*ratio-mx/newZoom;
  panY=(panY+my/zoomLevel)*ratio-my/newZoom;
  zoomLevel=newZoom;
},{passive:false});

// Touch
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===1){
    var t=e.touches[0];
    var n=hitTest(t.clientX,t.clientY);
    if(n){dragging=n;n.fixed=true;e.preventDefault();}
    else{panning=true;panSX=t.clientX;panSY=t.clientY;}
  }
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  if(dragging&&e.touches.length===1){
    var p=fromScreen(e.touches[0].clientX,e.touches[0].clientY);
    dragging.x=p.x;dragging.y=p.y;
    e.preventDefault();
  }else if(panning&&e.touches.length===1){
    var dx=(e.touches[0].clientX-panSX)/zoomLevel;
    var dy=(e.touches[0].clientY-panSY)/zoomLevel;
    panX+=dx;panY+=dy;
    panSX=e.touches[0].clientX;panSY=e.touches[0].clientY;
  }
},{passive:false});
canvas.addEventListener('touchend',function(){
  if(dragging){dragging.fixed=false;dragging=null;}
  panning=false;
});

// ===== 详情面板 =====
function showDetail(n){
  var p=document.getElementById('detail-panel');
  p.querySelector('.dp-title').textContent=n.label;
  p.querySelector('.dp-cat').textContent=gl(n.cat);
  p.querySelector('.dp-desc').textContent=n.desc;
  var docDiv=p.querySelector('.dp-docs');docDiv.innerHTML='';
  (n.docs||[]).forEach(function(d){
    var el=document.createElement('div');el.className='dp-doc';
    el.textContent='📄 '+d;docDiv.appendChild(el);
  });
  var relDiv=p.querySelector('.dp-relations');relDiv.innerHTML='';
  for(var i=0;i<edges.length;i++){
    var e=edges[i];
    if(e.source.id===n.id||e.target.id===n.id){
      var other=e.source.id===n.id?e.target:e.source;
      var el=document.createElement('div');el.className='dp-rel';
      el.textContent='→ '+other.label+'  ('+e.label+')';
      el.onclick=function(node){return function(){showDetail(node);}}(other);
      relDiv.appendChild(el);
    }
  }
  p.classList.add('open');
  document.getElementById('search-input').blur();
}
window.closePanel=function(){
  document.getElementById('detail-panel').classList.remove('open');
};

// ===== 搜索 =====
window.doSearch=function(val){
  searchQuery=val;
  var cl=document.getElementById('search-clear');
  if(val){cl.style.display='inline';}else{cl.style.display='none';document.getElementById('search-count').textContent='';}
};
window.clearSearch=function(){
  document.getElementById('search-input').value='';
  searchQuery='';
  document.getElementById('search-clear').style.display='none';
  document.getElementById('search-count').textContent='';
};

// ===== 主循环 =====
function loop(){
  simulate();
  render();
  requestAnimationFrame(loop);
}

// 初始模拟多跑几轮让节点散开
for(var i=0;i<300;i++) simulate();
loop();

console.log('🎯 唯识论知识库概念地图 — 纯 Canvas 引擎已就绪');
</script>
